<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Track Runner - Offline Racing Game</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            min-height: 100vh;
            overflow: hidden;
            touch-action: none;
        }
        
        #gameContainer {
            position: relative;
            width: 100vw;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        
        #gameCanvas {
            background: #2d2d2d;
            border-radius: 8px;
            box-shadow: 0 0 30px rgba(0, 255, 255, 0.3);
        }
        
        .menu {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0, 0, 0, 0.9);
            padding: 40px;
            border-radius: 20px;
            border: 2px solid #00ffff;
            text-align: center;
            z-index: 100;
            min-width: 400px;
        }
        
        .menu h1 {
            color: #00ffff;
            font-size: 48px;
            margin-bottom: 30px;
            text-shadow: 0 0 20px #00ffff;
        }
        
        .menu h2 {
            color: #ff6b6b;
            font-size: 32px;
            margin-bottom: 20px;
        }
        
        .menu button {
            display: block;
            width: 100%;
            padding: 15px 30px;
            margin: 10px 0;
            font-size: 18px;
            font-weight: bold;
            color: #fff;
            background: linear-gradient(135deg, #00ffff 0%, #0080ff 100%);
            border: none;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.3s;
            text-transform: uppercase;
        }
        
        .menu button:hover {
            transform: scale(1.05);
            box-shadow: 0 0 20px rgba(0, 255, 255, 0.5);
        }
        
        .menu button.secondary {
            background: linear-gradient(135deg, #ff6b6b 0%, #ff4757 100%);
        }
        
        .menu button.tertiary {
            background: linear-gradient(135deg, #a55eea 0%, #8854d0 100%);
        }
        
        .hidden {
            display: none !important;
        }
        
        #hud {
            position: absolute;
            top: 20px;
            left: 20px;
            color: #fff;
            font-size: 18px;
            z-index: 50;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.8);
        }
        
        #hud div {
            margin: 5px 0;
        }
        
        #speed {
            color: #00ffff;
            font-size: 24px;
            font-weight: bold;
        }
        
        #lapTime {
            color: #ff6b6b;
        }
        
        #bestTime {
            color: #a55eea;
        }
        
        #controls {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 20px;
            z-index: 50;
        }
        
        .control-btn {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.2);
            border: 3px solid rgba(255, 255, 255, 0.5);
            color: white;
            font-size: 24px;
            font-weight: bold;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            user-select: none;
            -webkit-user-select: none;
            touch-action: none;
        }
        
        .control-btn:active {
            background: rgba(0, 255, 255, 0.4);
            border-color: #00ffff;
        }
        
        #customizePanel {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0, 0, 0, 0.95);
            padding: 30px;
            border-radius: 20px;
            border: 2px solid #ff6b6b;
            z-index: 100;
            min-width: 500px;
        }
        
        .color-picker {
            display: flex;
            gap: 10px;
            margin: 15px 0;
            flex-wrap: wrap;
        }
        
        .color-option {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            cursor: pointer;
            border: 3px solid transparent;
            transition: all 0.3s;
        }
        
        .color-option:hover, .color-option.selected {
            border-color: #fff;
            transform: scale(1.1);
        }
        
        .slider-container {
            margin: 20px 0;
        }
        
        .slider-container label {
            color: #fff;
            display: block;
            margin-bottom: 10px;
        }
        
        .slider-container input {
            width: 100%;
            height: 10px;
            border-radius: 5px;
            background: #333;
            outline: none;
            -webkit-appearance: none;
        }
        
        .slider-container input::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 20px;
            height: 20px;
            border-radius: 50%;
            background: #00ffff;
            cursor: pointer;
        }
        
        #trackEditor {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0, 0, 0, 0.95);
            padding: 20px;
            border-radius: 20px;
            border: 2px solid #a55eea;
            z-index: 100;
        }
        
        #editorCanvas {
            background: #2d2d2d;
            border: 2px solid #555;
            border-radius: 8px;
            cursor: crosshair;
        }
        
        .editor-controls {
            display: flex;
            gap: 10px;
            margin-top: 15px;
            flex-wrap: wrap;
        }
        
        .editor-controls button {
            padding: 10px 20px;
            font-size: 14px;
            background: #333;
            color: #fff;
            border: 1px solid #555;
            border-radius: 5px;
            cursor: pointer;
        }
        
        .editor-controls button:hover {
            background: #444;
        }
        
        .editor-controls button.active {
            background: #a55eea;
            border-color: #a55eea;
        }
        
        #leaderboardPanel {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0, 0, 0, 0.95);
            padding: 30px;
            border-radius: 20px;
            border: 2px solid #00ffff;
            z-index: 100;
            min-width: 450px;
            max-height: 80vh;
            overflow-y: auto;
        }
        
        #leaderboardPanel h2 {
            color: #00ffff;
            margin-bottom: 20px;
            text-align: center;
        }
        
        .leaderboard-entry {
            display: flex;
            justify-content: space-between;
            padding: 15px;
            margin: 10px 0;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 10px;
            color: #fff;
        }
        
        .leaderboard-entry:nth-child(1) {
            background: rgba(255, 215, 0, 0.2);
            border: 2px solid gold;
        }
        
        .leaderboard-entry:nth-child(2) {
            background: rgba(192, 192, 192, 0.2);
            border: 2px solid silver;
        }
        
        .leaderboard-entry:nth-child(3) {
            background: rgba(205, 127, 50, 0.2);
            border: 2px solid bronze;
        }
        
        .leaderboard-entry .rank {
            font-weight: bold;
            color: #00ffff;
            width: 40px;
        }
        
        .leaderboard-entry .name {
            flex: 1;
            text-align: left;
        }
        
        .leaderboard-entry .time {
            color: #ff6b6b;
            font-weight: bold;
        }
        
        .leaderboard-entry .ghost-btn {
            background: #a55eea;
            border: none;
            color: white;
            padding: 5px 15px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 12px;
        }
        
        .leaderboard-entry .ghost-btn:hover {
            background: #8854d0;
        }
        
        .track-select {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }
        
        .track-option {
            padding: 10px 20px;
            background: #333;
            color: #fff;
            border: 2px solid #555;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s;
        }
        
        .track-option:hover, .track-option.selected {
            background: #00ffff;
            color: #000;
            border-color: #00ffff;
        }
        
        #notification {
            position: fixed;
            top: 20px;
            right: 20px;
            padding: 15px 25px;
            background: rgba(0, 255, 255, 0.9);
            color: #000;
            border-radius: 10px;
            font-weight: bold;
            z-index: 200;
            transform: translateX(400px);
            transition: transform 0.3s;
        }
        
        #notification.show {
            transform: translateX(0);
        }
        
        #notification.error {
            background: rgba(255, 107, 107, 0.9);
            color: #fff;
        }
        
        #notification.success {
            background: rgba(0, 255, 136, 0.9);
            color: #000;
        }
        
        @media (max-width: 768px) {
            .menu, #customizePanel, #leaderboardPanel {
                min-width: 90%;
                padding: 20px;
            }
            
            .menu h1 {
                font-size: 32px;
            }
            
            #controls {
                bottom: 10px;
                gap: 10px;
            }
            
            .control-btn {
                width: 60px;
                height: 60px;
                font-size: 20px;
            }
            
            #editorCanvas {
                width: 300px;
                height: 300px;
            }
        }
    </style>
</head>
<body>
    <div id="gameContainer">
        <canvas id="gameCanvas"></canvas>
        
        <div id="hud" class="hidden">
            <div id="speed">Speed: 0 km/h</div>
            <div id="lapTime">Lap Time: 0:00.000</div>
            <div id="bestTime">Best Time: --:--.---</div>
            <div id="lap">Lap: 1/3</div>
            <div id="position">Position: 1st</div>
        </div>
        
        <div id="controls" class="hidden">
            <button class="control-btn" id="leftBtn">◀</button>
            <button class="control-btn" id="rightBtn">▶</button>
            <button class="control-btn" id="brakeBtn">🛑</button>
            <button class="control-btn" id="gasBtn">⚡</button>
        </div>
        
        <!-- Main Menu -->
        <div id="mainMenu" class="menu">
            <h1>🏎️ TRACK RUNNER</h1>
            <button onclick="startGame()">🏁 Quick Race</button>
            <button onclick="showTrackSelect()">🗺️ Select Track</button>
            <button onclick="showLeaderboard()">🏆 Leaderboard</button>
            <button onclick="showCustomize()" class="secondary">🎨 Customize Car</button>
            <button onclick="showTrackEditor()" class="tertiary">✏️ Track Editor</button>
            <button onclick="showSettings()" class="tertiary">⚙️ Settings</button>
        </div>
        
        <!-- Track Select -->
        <div id="trackSelectMenu" class="menu hidden">
            <h2>Select Track</h2>
            <div class="track-select" id="trackOptions"></div>
            <button onclick="hideTrackSelect()">← Back</button>
        </div>
        
        <!-- Customize Panel -->
        <div id="customizePanel" class="hidden">
            <h2 style="color: #ff6b6b; text-align: center;">Customize Your Car</h2>
            
            <div class="slider-container">
                <label>Body Color</label>
                <div class="color-picker" id="bodyColors"></div>
            </div>
            
            <div class="slider-container">
                <label>Accent Color</label>
                <div class="color-picker" id="accentColors"></div>
            </div>
            
            <div class="slider-container">
                <label>Wheel Color</label>
                <div class="color-picker" id="wheelColors"></div>
            </div>
            
            <div class="slider-container">
                <label>Car Style</label>
                <input type="range" id="carStyle" min="0" max="3" value="0">
            </div>
            
            <div class="slider-container">
                <label>Decal</label>
                <input type="range" id="carDecal" min="0" max="5" value="0">
            </div>
            
            <div style="display: flex; gap: 10px; margin-top: 20px;">
                <button onclick="saveCustomization()" style="flex: 1;">Save</button>
                <button onclick="hideCustomize()" class="secondary" style="flex: 1;">Cancel</button>
            </div>
        </div>
        
        <!-- Track Editor -->
        <div id="trackEditor" class="hidden">
            <h2 style="color: #a55eea; text-align: center; margin-bottom: 15px;">Track Editor</h2>
            <canvas id="editorCanvas" width="500" height="500"></canvas>
            <div class="editor-controls">
                <button onclick="setEditorTool('road')" id="roadTool" class="active">Road</button>
                <button onclick="setEditorTool('wall')" id="wallTool">Wall</button>
                <button onclick="setEditorTool('start')" id="startTool">Start</button>
                <button onclick="setEditorTool('erase')" id="eraseTool">Eraser</button>
                <button onclick="clearTrack()">Clear</button>
                <button onclick="saveTrack()">Save Track</button>
                <button onclick="loadTrack()">Load Track</button>
                <button onclick="hideTrackEditor()" class="secondary">Close</button>
            </div>
        </div>
        
        <!-- Leaderboard Panel -->
        <div id="leaderboardPanel" class="hidden">
            <h2>🏆 Leaderboard</h2>
            <div class="track-select" id="leaderboardTrackOptions"></div>
            <div id="leaderboardList"></div>
            <button onclick="hideLeaderboard()" style="margin-top: 20px;">← Back</button>
        </div>
        
        <!-- Settings -->
        <div id="settingsMenu" class="menu hidden">
            <h2>Settings</h2>
            <div class="slider-container">
                <label>Player Name</label>
                <input type="text" id="playerName" placeholder="Enter your name" style="width: 100%; padding: 10px; border-radius: 5px; border: 1px solid #555; background: #333; color: #fff;">
            </div>
            <div class="slider-container">
                <label>Difficulty</label>
                <select id="difficulty" style="width: 100%; padding: 10px; border-radius: 5px; border: 1px solid #555; background: #333; color: #fff;">
                    <option value="easy">Easy</option>
                    <option value="medium" selected>Medium</option>
                    <option value="hard">Hard</option>
                </select>
            </div>
            <div class="slider-container">
                <label>Laps</label>
                <select id="lapCount" style="width: 100%; padding: 10px; border-radius: 5px; border: 1px solid #555; background: #333; color: #fff;">
                    <option value="1">1 Lap</option>
                    <option value="3" selected>3 Laps</option>
                    <option value="5">5 Laps</option>
                </select>
            </div>
            <button onclick="saveSettings()">Save Settings</button>
            <button onclick="hideSettings()" class="secondary">← Back</button>
        </div>
        
        <!-- Pause Menu -->
        <div id="pauseMenu" class="menu hidden">
            <h2>PAUSED</h2>
            <button onclick="resumeGame()">▶ Resume</button>
            <button onclick="restartRace()">🔄 Restart</button>
            <button onclick="quitToMenu()" class="secondary">🚪 Quit to Menu</button>
        </div>
        
        <!-- Race Complete -->
        <div id="raceComplete" class="menu hidden">
            <h2>🏁 Race Complete!</h2>
            <div id="raceResults" style="color: #fff; margin: 20px 0;"></div>
            <button onclick="restartRace()">🔄 Race Again</button>
            <button onclick="quitToMenu()" class="secondary">🚪 Main Menu</button>
        </div>
        
        <div id="notification"></div>
    </div>

    <script>
        // Game Configuration
        const CONFIG = {
            canvasWidth: 800,
            canvasHeight: 600,
            maxSpeed: 12,
            acceleration: 0.15,
            deceleration: 0.05,
            turnSpeed: 0.05,
            friction: 0.98,
            offRoadFriction: 0.95,
            checkpointDistance: 50
        };

        // Game State
        let gameState = {
            currentScreen: 'menu',
            isPaused: false,
            isRacing: false,
            selectedTrack: 0,
            currentLap: 1,
            totalLaps: 3,
            lapStartTime: 0,
            bestLapTime: Infinity,
            raceStartTime: 0,
            checkpoints: [],
            currentCheckpoint: 0,
            ghostData: [],
            recordingGhost: true,
            playingGhost: false,
            ghostIndex: 0
        };

        // Car State
        let car = {
            x: 0,
            y: 0,
            angle: 0,
            speed: 0,
            bodyColor: '#ff0000',
            accentColor: '#ffffff',
            wheelColor: '#333333',
            style: 0,
            decal: 0
        };

        // Input State
        let keys = {
            up: false,
            down: false,
            left: false,
            right: false
        };

        // Canvas and Context
        let canvas, ctx, editorCanvas, editorCtx;

        // Tracks
        let tracks = [];
        let customTracks = [];

        // Leaderboard
        let leaderboard = {};

        // Editor State
        let editorState = {
            tool: 'road',
            isDrawing: false,
            gridSize: 20
        };

        // Initialize Game
        function init() {
            canvas = document.getElementById('gameCanvas');
            ctx = canvas.getContext('2d');
            editorCanvas = document.getElementById('editorCanvas');
            editorCtx = editorCanvas.getContext('2d');
            
            resizeCanvas();
            window.addEventListener('resize', resizeCanvas);
            
            loadSettings();
            loadCustomization();
            loadTracks();
            loadLeaderboard();
            loadCustomTracks();
            
            setupControls();
            setupEditor();
            setupColorPickers();
            
            renderTrackOptions();
            renderLeaderboardTrackOptions();
            
            gameLoop();
        }

        function resizeCanvas() {
            const container = document.getElementById('gameContainer');
            const maxWidth = Math.min(window.innerWidth - 40, 800);
            const maxHeight = Math.min(window.innerHeight - 40, 600);
            const aspectRatio = 800 / 600;
            
            if (maxWidth / maxHeight > aspectRatio) {
                canvas.height = maxHeight;
                canvas.width = maxHeight * aspectRatio;
            } else {
                canvas.width = maxWidth;
                canvas.height = maxWidth / aspectRatio;
            }
            
            CONFIG.canvasWidth = canvas.width;
            CONFIG.canvasHeight = canvas.height;
        }

        // Predefined Tracks
        function loadTracks() {
            tracks = [
                {
                    name: 'Oval Circuit',
                    width: 800,
                    height: 600,
                    road: createOvalTrack(),
                    walls: createOvalWalls(),
                    start: { x: 400, y: 500, angle: -Math.PI / 2 },
                    checkpoints: createOvalCheckpoints()
                },
                {
                    name: 'Figure 8',
                    width: 800,
                    height: 600,
                    road: createFigure8Track(),
                    walls: createFigure8Walls(),
                    start: { x: 400, y: 300, angle: 0 },
                    checkpoints: createFigure8Checkpoints()
                },
                {
                    name: 'Technical Circuit',
                    width: 800,
                    height: 600,
                    road: createTechnicalTrack(),
                    walls: createTechnicalWalls(),
                    start: { x: 100, y: 300, angle: 0 },
                    checkpoints: createTechnicalCheckpoints()
                }
            ];
        }

        function createOvalTrack() {
            const road = [];
            const centerX = 400, centerY = 300;
            const outerRadiusX = 350, outerRadiusY = 250;
            const innerRadiusX = 250, innerRadiusY = 150;
            
            for (let angle = 0; angle < Math.PI * 2; angle += 0.05) {
                const outerX = centerX + Math.cos(angle) * outerRadiusX;
                const outerY = centerY + Math.sin(angle) * outerRadiusY;
                const innerX = centerX + Math.cos(angle) * innerRadiusX;
                const innerY = centerY + Math.sin(angle) * innerRadiusY;
                road.push({ x1: outerX, y1: outerY, x2: innerX, y2: innerY });
            }
            return road;
        }

        function createOvalWalls() {
            const walls = [];
            const centerX = 400, centerY = 300;
            const outerRadiusX = 360, outerRadiusY = 260;
            const innerRadiusX = 240, innerRadiusY = 140;
            
            for (let angle = 0; angle < Math.PI * 2; angle += 0.1) {
                walls.push({ x: centerX + Math.cos(angle) * outerRadiusX, y: centerY + Math.sin(angle) * outerRadiusY });
                walls.push({ x: centerX + Math.cos(angle) * innerRadiusX, y: centerY + Math.sin(angle) * innerRadiusY });
            }
            return walls;
        }

        function createOvalCheckpoints() {
            return [
                { x: 400, y: 50 },
                { x: 750, y: 300 },
                { x: 400, y: 550 },
                { x: 50, y: 300 }
            ];
        }

        function createFigure8Track() {
            const road = [];
            // Left loop
            for (let angle = Math.PI; angle <= Math.PI * 2; angle += 0.05) {
                const x = 300 + Math.cos(angle) * 150;
                const y = 200 + Math.sin(angle) * 100;
                road.push({ x1: x + 30, y1: y + 20, x2: x - 30, y2: y - 20 });
            }
            // Right loop
            for (let angle = 0; angle <= Math.PI; angle += 0.05) {
                const x = 500 + Math.cos(angle) * 150;
                const y = 400 + Math.sin(angle) * 100;
                road.push({ x1: x + 30, y1: y + 20, x2: x - 30, y2: y - 20 });
            }
            // Connecting roads
            road.push({ x1: 300, y1: 200, x2: 500, y2: 400 });
            road.push({ x1: 300, y1: 200, x2: 500, y2: 400 });
            return road;
        }

        function createFigure8Walls() {
            const walls = [];
            // Left loop walls
            for (let angle = Math.PI; angle <= Math.PI * 2; angle += 0.1) {
                walls.push({ x: 300 + Math.cos(angle) * 180, y: 200 + Math.sin(angle) * 130 });
                walls.push({ x: 300 + Math.cos(angle) * 120, y: 200 + Math.sin(angle) * 70 });
            }
            // Right loop walls
            for (let angle = 0; angle <= Math.PI; angle += 0.1) {
                walls.push({ x: 500 + Math.cos(angle) * 180, y: 400 + Math.sin(angle) * 130 });
                walls.push({ x: 500 + Math.cos(angle) * 120, y: 400 + Math.sin(angle) * 70 });
            }
            return walls;
        }

        function createFigure8Checkpoints() {
            return [
                { x: 300, y: 100 },
                { x: 650, y: 400 },
                { x: 500, y: 500 },
                { x: 150, y: 200 }
            ];
        }

        function createTechnicalTrack() {
            const road = [];
            // Complex track with straights and curves
            const points = [
                { x: 100, y: 300 }, { x: 200, y: 300 }, { x: 250, y: 250 },
                { x: 250, y: 150 }, { x: 350, y: 100 }, { x: 450, y: 100 },
                { x: 550, y: 150 }, { x: 550, y: 250 }, { x: 600, y: 300 },
                { x: 700, y: 300 }, { x: 700, y: 400 }, { x: 600, y: 450 },
                { x: 550, y: 450 }, { x: 550, y: 500 }, { x: 450, y: 550 },
                { x: 350, y: 550 }, { x: 250, y: 500 }, { x: 250, y: 450 },
                { x: 200, y: 400 }, { x: 100, y: 400 }
            ];
            
            for (let i = 0; i < points.length; i++) {
                const next = points[(i + 1) % points.length];
                const dx = next.x - points[i].x;
                const dy = next.y - points[i].y;
                const len = Math.sqrt(dx * dx + dy * dy);
                const nx = -dy / len * 25;
                const ny = dx / len * 25;
                road.push({ x1: points[i].x + nx, y1: points[i].y + ny, x2: points[i].x - nx, y2: points[i].y - ny });
            }
            return road;
        }

        function createTechnicalWalls() {
            const walls = [];
            const points = [
                { x: 100, y: 300 }, { x: 200, y: 300 }, { x: 250, y: 250 },
                { x: 250, y: 150 }, { x: 350, y: 100 }, { x: 450, y: 100 },
                { x: 550, y: 150 }, { x: 550, y: 250 }, { x: 600, y: 300 },
                { x: 700, y: 300 }, { x: 700, y: 400 }, { x: 600, y: 450 },
                { x: 550, y: 450 }, { x: 550, y: 500 }, { x: 450, y: 550 },
                { x: 350, y: 550 }, { x: 250, y: 500 }, { x: 250, y: 450 },
                { x: 200, y: 400 }, { x: 100, y: 400 }
            ];
            
            for (let i = 0; i < points.length; i++) {
                const next = points[(i + 1) % points.length];
                const dx = next.x - points[i].x;
                const dy = next.y - points[i].y;
                const len = Math.sqrt(dx * dx + dy * dy);
                const nx = -dy / len * 35;
                const ny = dx / len * 35;
                walls.push({ x: points[i].x + nx, y: points[i].y + ny });
                walls.push({ x: points[i].x - nx, y: points[i].y - ny });
            }
            return walls;
        }

        function createTechnicalCheckpoints() {
            return [
                { x: 250, y: 150 },
                { x: 450, y: 100 },
                { x: 600, y: 300 },
                { x: 550, y: 500 },
                { x: 350, y: 550 },
                { x: 150, y: 350 }
            ];
        }

        // Track Editor Setup
        function setupEditor() {
            editorCanvas.addEventListener('mousedown', startDrawing);
            editorCanvas.addEventListener('mousemove', draw);
            editorCanvas.addEventListener('mouseup', stopDrawing);
            editorCanvas.addEventListener('mouseleave', stopDrawing);
            
            editorCanvas.addEventListener('touchstart', (e) => {
                e.preventDefault();
                const touch = e.touches[0];
                const rect = editorCanvas.getBoundingClientRect();
                startDrawing({ clientX: touch.clientX, clientY: touch.clientY });
            });
            
            editorCanvas.addEventListener('touchmove', (e) => {
                e.preventDefault();
                const touch = e.touches[0];
                draw({ clientX: touch.clientX, clientY: touch.clientY });
            });
            
            editorCanvas.addEventListener('touchend', stopDrawing);
            
            clearEditor();
        }

        let editorTrack = { road: [], walls: [], start: { x: 250, y: 250, angle: 0 } };

        function clearEditor() {
            editorCtx.fillStyle = '#2d2d2d';
            editorCtx.fillRect(0, 0, 500, 500);
            editorTrack = { road: [], walls: [], start: { x: 250, y: 250, angle: 0 } };
            drawGrid();
        }

        function drawGrid() {
            editorCtx.strokeStyle = '#444';
            editorCtx.lineWidth = 0.5;
            for (let x = 0; x < 500; x += 20) {
                editorCtx.beginPath();
                editorCtx.moveTo(x, 0);
                editorCtx.lineTo(x, 500);
                editorCtx.stroke();
            }
            for (let y = 0; y < 500; y += 20) {
                editorCtx.beginPath();
                editorCtx.moveTo(0, y);
                editorCtx.lineTo(500, y);
                editorCtx.stroke();
            }
        }

        function startDrawing(e) {
            editorState.isDrawing = true;
            draw(e);
        }

        function draw(e) {
            if (!editorState.isDrawing) return;
            
            const rect = editorCanvas.getBoundingClientRect();
            const x = e.clientX - rect.left;
            const y = e.clientY - rect.top;
            
            const gridX = Math.floor(x / editorState.gridSize) * editorState.gridSize;
            const gridY = Math.floor(y / editorState.gridSize) * editorState.gridSize;
            
            if (editorState.tool === 'road') {
                editorCtx.fillStyle = '#555';
                editorCtx.fillRect(gridX, gridY, editorState.gridSize, editorState.gridSize);
                editorTrack.road.push({ x: gridX + 10, y: gridY + 10, radius: 15 });
            } else if (editorState.tool === 'wall') {
                editorCtx.fillStyle = '#ff6b6b';
                editorCtx.fillRect(gridX, gridY, editorState.gridSize, editorState.gridSize);
                editorTrack.walls.push({ x: gridX + 10, y: gridY + 10, radius: 10 });
            } else if (editorState.tool === 'start') {
                editorCtx.fillStyle = '#00ff00';
                editorCtx.fillRect(gridX, gridY, editorState.gridSize, editorState.gridSize);
                editorTrack.start = { x: gridX + 10, y: gridY + 10, angle: 0 };
            } else if (editorState.tool === 'erase') {
                editorCtx.fillStyle = '#2d2d2d';
                editorCtx.fillRect(gridX, gridY, editorState.gridSize, editorState.gridSize);
                editorTrack.road = editorTrack.road.filter(p => 
                    !(p.x >= gridX && p.x < gridX + 20 && p.y >= gridY && p.y < gridY + 20)
                );
                editorTrack.walls = editorTrack.walls.filter(p => 
                    !(p.x >= gridX && p.x < gridX + 20 && p.y >= gridY && p.y < gridY + 20)
                );
            }
        }

        function stopDrawing() {
            editorState.isDrawing = false;
        }

        function setEditorTool(tool) {
            editorState.tool = tool;
            document.querySelectorAll('.editor-controls button').forEach(btn => btn.classList.remove('active'));
            document.getElementById(tool + 'Tool').classList.add('active');
        }

        function loadTrack() {
            if (customTracks.length === 0) {

            const trackNames = customTracks.map((t, i) => `${i + 1}. ${t.name}`).join('\n');

            if (selection) {

                if (index >= 0 && index < customTracks.length) {

                    });
                    editorTrack.walls.forEach(p => {
                        editorCtx.fillStyle = '#ff6b6b';
                        editorCtx.fillRect(p.x - 10, p.y - 10, 20, 20);
                    });
                    editorCtx.fillStyle = '#00ff00';
                    editorCtx.fillRect(editorTrack.start.x - 10, editorTrack.start.y - 10, 20, 20);
                }
            }
        }

        function generateCheckpoints(road) {
            if (road.length < 4) return [];
            const checkpoints = [];
            const step = Math.floor(road.length / 4);
            for (let i = 0; i < road.length; i += step) {
                if (road[i]) checkpoints.push({ x: road[i].x, y: road[i].y });
            }
            return checkpoints;
        }

            } else if (difficulty === 'hard') {

        // Game Loop
        function gameLoop() {
            if (gameState.isRacing && !gameState.isPaused) {
                update();
            }
            render();
            requestAnimationFrame(gameLoop);
        }

        function update() {
            // Handle input
            if (keys.up) {
                car.speed += CONFIG.acceleration;
            }
            if (keys.down) {
                car.speed -= CONFIG.acceleration * 1.5;
            }
            
            // Apply friction
            const onRoad = isOnRoad();
            car.speed *= onRoad ? CONFIG.friction : CONFIG.offRoadFriction;
            
            // Clamp speed
            car.speed = Math.max(-CONFIG.maxSpeed / 2, Math.min(CONFIG.maxSpeed, car.speed));
            
            // Steering (only when moving)
            if (Math.abs(car.speed) > 0.5) {
                const turnFactor = car.speed / CONFIG.maxSpeed;
                if (keys.left) {
                    car.angle -= CONFIG.turnSpeed * turnFactor;
                }
                if (keys.right) {
                    car.angle += CONFIG.turnSpeed * turnFactor;
                }
            }
            
            // Update position
            car.x += Math.cos(car.angle) * car.speed;
            car.y += Math.sin(car.angle) * car.speed;
            
            // Collision with walls
            checkWallCollision();
            
            // Check checkpoints
            checkCheckpoints();
            
            // Record ghost data
            if (gameState.recordingGhost && gameState.isRacing) {
                gameState.ghostData.push({
                    x: car.x,
                    y: car.y,
                    angle: car.angle,
                    time: Date.now() - gameState.lapStartTime
                });
            }
            
            // Update ghost
            if (gameState.playingGhost && gameState.ghostData.length > 0) {
                if (gameState.ghostIndex < gameState.ghostData.length) {
                    gameState.ghostIndex++;
                }
            }
            
            // Update HUD
            updateHUD();
        }

        function isOnRoad() {
            const allTracks = [...tracks, ...customTracks];
            const track = allTracks[gameState.selectedTrack] || tracks[0];
            
            // Check if car is on road (simplified collision)
            for (const road of track.road) {
                if (road.x1 !== undefined) {
                    // Line segment road
                    const dist = pointToLineDistance(car.x, car.y, road.x1, road.y1, road.x2, road.y2);
                    if (dist < 30) return true;
                } else {
                    // Point-based road (for custom tracks)
                    const dist = Math.sqrt((car.x - road.x) ** 2 + (car.y - road.y) ** 2);
                    if (dist < road.radius + 15) return true;
                }
            }
            return false;
        }

        function pointToLineDistance(px, py, x1, y1, x2, y2) {
            const A = px - x1;
            const B = py - y1;
            const C = x2 - x1;
            const D = y2 - y1;
            const dot = A * C + B * D;
            const lenSq = C * C + D * D;
            let param = -1;
            if (lenSq !== 0) param = dot / lenSq;
            let xx, yy;
            if (param < 0) { xx = x1; yy = y1; }
            else if (param > 1) { xx = x2; yy = y2; }
            else { xx = x1 + param * C; yy = y1 + param * D; }
            return Math.sqrt((px - xx) ** 2 + (py - yy) ** 2);
        }

        function checkWallCollision() {
            const allTracks = [...tracks, ...customTracks];
            const track = allTracks[gameState.selectedTrack] || tracks[0];
            
            for (const wall of track.walls) {
                let wx, wy;
                if (wall.x !== undefined && wall.radius !== undefined) {
                    wx = wall.x;
                    wy = wall.y;
                    const dist = Math.sqrt((car.x - wx) ** 2 + (car.y - wy) ** 2);
                    if (dist < wall.radius + 10) {
                        car.speed *= -0.5;
                        car.x -= Math.cos(car.angle) * 5;
                        car.y -= Math.sin(car.angle) * 5;
                    }
                } else {
                    wx = wall.x;
                    wy = wall.y;
                    const dist = Math.sqrt((car.x - wx) ** 2 + (car.y - wy) ** 2);
                    if (dist < 15) {
                        car.speed *= -0.5;
                        car.x -= Math.cos(car.angle) * 5;
                        car.y -= Math.sin(car.angle) * 5;
                    }
                }
            }
            
            // Boundary collision
            if (car.x < 20 || car.x > CONFIG.canvasWidth - 20 || 
                car.y < 20 || car.y > CONFIG.canvasHeight - 20) {
                car.speed *= -0.5;
                car.x = Math.max(20, Math.min(CONFIG.canvasWidth - 20, car.x));
                car.y = Math.max(20, Math.min(CONFIG.canvasHeight - 20, car.y));
            }
        }

        function checkCheckpoints() {
            if (gameState.checkpoints.length === 0) return;
            
            const checkpoint = gameState.checkpoints[gameState.currentCheckpoint];
            const dist = Math.sqrt((car.x - checkpoint.x) ** 2 + (car.y - checkpoint.y) ** 2);
            
            if (dist < CONFIG.checkpointDistance) {
                gameState.currentCheckpoint++;
                
                if (gameState.currentCheckpoint >= gameState.checkpoints.length) {
                    // Lap completed
                    const lapTime = Date.now() - gameState.lapStartTime;
                    
                    if (lapTime < gameState.bestLapTime) {
                        gameState.bestLapTime = lapTime;
                    }
                    
                    if (gameState.currentLap >= gameState.totalLaps) {
                        // Race complete
                        completeRace(lapTime);
                    } else {
                        gameState.currentLap++;
                        gameState.currentCheckpoint = 0;
                        gameState.lapStartTime = Date.now();
                    }
                }
            }
        }

        function completeRace(finalLapTime) {
            gameState.isRacing = false;
            
            const totalTime = Date.now() - gameState.raceStartTime;
            const playerName = localStorage.getItem('playerName') || 'Player';
            const allTracks = [...tracks, ...customTracks];
            const trackName = allTracks[gameState.selectedTrack]?.name || 'Unknown';
            
            // Save to leaderboard
            if (!leaderboard[trackName]) {
                leaderboard[trackName] = [];
            }
            
            leaderboard[trackName].push({
                name: playerName,
                time: gameState.bestLapTime,
                ghost: gameState.ghostData,
                date: new Date().toISOString()
            });
            
            localStorage.setItem('leaderboard', JSON.stringify(leaderboard));
            
            // Show results
            document.getElementById('raceResults').innerHTML = `
                <p>Best Lap: ${formatTime(gameState.bestLapTime)}</p>
                <p>Total Time: ${formatTime(totalTime)}</p>
                <p>Track: ${trackName}</p>
            `;
            
            document.getElementById('raceComplete').classList.remove('hidden');
            
            // Try to sync with online leaderboard
            syncLeaderboard(trackName, {
                name: playerName,
                time: gameState.bestLapTime,
                ghost: gameState.ghostData
            });
        }

        function updateHUD() {
            const speedKmh = Math.abs(car.speed) * 20;
            document.getElementById('speed').textContent = `Speed: ${Math.round(speedKmh)} km/h`;
            
            const lapTime = Date.now() - gameState.lapStartTime;
            document.getElementById('lapTime').textContent = `Lap Time: ${formatTime(lapTime)}`;
            document.getElementById('bestTime').textContent = `Best Time: ${formatTime(gameState.bestLapTime)}`;
            document.getElementById('lap').textContent = `Lap: ${gameState.currentLap}/${gameState.totalLaps}`;
        }

        function formatTime(ms) {
            if (ms === Infinity) return '--:--.---';
            const minutes = Math.floor(ms / 60000);
            const seconds = Math.floor((ms % 60000) / 1000);
            const milliseconds = ms % 1000;
            return `${minutes}:${seconds.toString().padStart(2, '0')}.${milliseconds.toString().padStart(3, '0')}`;
        }

        // Rendering
        function render() {
            ctx.fillStyle = '#1a1a2e';
            ctx.fillRect(0, 0, CONFIG.canvasWidth, CONFIG.canvasHeight);
            
            if (gameState.isRacing || gameState.currentScreen === 'menu') {
                const allTracks = [...tracks, ...customTracks];
                const track = allTracks[gameState.selectedTrack] || tracks[0];
                renderTrack(track);
                
                if (gameState.isRacing) {
                    // Render ghost
                    if (gameState.playingGhost && gameState.ghostData.length > 0 && gameState.ghostIndex < gameState.ghostData.length) {
                        const ghost = gameState.ghostData[gameState.ghostIndex];
                        renderCar(ghost.x, ghost.y, ghost.angle, '#00ffff', '#ffffff', '#333333', 0, 0, true);
                    }
                    
                    renderCar(car.x, car.y, car.angle, car.bodyColor, car.accentColor, car.wheelColor, car.style, car.decal);
                }
            }
        }

        function renderTrack(track) {
            // Draw road
            ctx.fillStyle = '#444';
            for (const road of track.road) {
                if (road.x1 !== undefined) {
                    // Line segment road
                    ctx.beginPath();
                    ctx.moveTo(road.x1, road.y1);
                    ctx.lineTo(road.x2, road.y2);
                    ctx.strokeStyle = '#555';
                    ctx.lineWidth = 50;
                    ctx.lineCap = 'round';
                    ctx.stroke();
                } else {
                    // Point-based road
                    ctx.beginPath();
                    ctx.arc(road.x, road.y, road.radius, 0, Math.PI * 2);
                    ctx.fill();
                }
            }
            
            // Draw road markings
            ctx.strokeStyle = '#fff';
            ctx.lineWidth = 2;
            ctx.setLineDash([20, 20]);
            for (const road of track.road) {
                if (road.x1 !== undefined) {
                    ctx.beginPath();
                    ctx.moveTo(road.x1, road.y1);
                    ctx.lineTo(road.x2, road.y2);
                    ctx.stroke();
                }
            }
            ctx.setLineDash([]);
            
            // Draw walls
            ctx.fillStyle = '#ff6b6b';
            for (const wall of track.walls) {
                let wx, wy, wr;
                if (wall.radius !== undefined) {
                    wx = wall.x;
                    wy = wall.y;
                    wr = wall.radius;
                } else {
                    wx = wall.x;
                    wy = wall.y;
                    wr = 10;
                }
                ctx.beginPath();
                ctx.arc(wx, wy, wr, 0, Math.PI * 2);
                ctx.fill();
            }
            
            // Draw start/finish line
            ctx.fillStyle = '#fff';
            ctx.fillRect(track.start.x - 20, track.start.y - 5, 40, 10);
            ctx.fillStyle = '#000';
            for (let i = 0; i < 4; i++) {
                ctx.fillRect(track.start.x - 20 + i * 10, track.start.y - 5, 5, 10);
            }
            
            // Draw checkpoints
            ctx.fillStyle = 'rgba(0, 255, 255, 0.3)';
            for (let i = 0; i < track.checkpoints.length; i++) {
                const cp = track.checkpoints[i];
                ctx.beginPath();
                ctx.arc(cp.x, cp.y, 15, 0, Math.PI * 2);
                ctx.fill();
                
                if (i === gameState.currentCheckpoint) {
                    ctx.strokeStyle = '#00ffff';
                    ctx.lineWidth = 3;
                    ctx.stroke();
                }
            }
        }

        function renderCar(x, y, angle, bodyColor, accentColor, wheelColor, style, decal, isGhost = false) {
            ctx.save();
            ctx.translate(x, y);
            ctx.rotate(angle);
            
            if (isGhost) {
                ctx.globalAlpha = 0.5;
            }
            
            // Car body based on style
            ctx.fillStyle = bodyColor;
            
            if (style === 0) {
                // Sports car
                ctx.beginPath();
                ctx.moveTo(25, 0);
                ctx.lineTo(15, -12);
                ctx.lineTo(-15, -12);
                ctx.lineTo(-25, -8);
                ctx.lineTo(-25, 8);
                ctx.lineTo(-15, 12);
                ctx.lineTo(15, 12);
                ctx.closePath();
                ctx.fill();
            } else if (style === 1) {
                // Sedan
                ctx.fillRect(-25, -10, 50, 20);
                ctx.fillRect(-10, -15, 20, 10);
            } else if (style === 2) {
                // Muscle car
                ctx.beginPath();
                ctx.moveTo(30, 0);
                ctx.lineTo(20, -14);
                ctx.lineTo(-10, -14);
                ctx.lineTo(-25, -10);
                ctx.lineTo(-25, 10);
                ctx.lineTo(-10, 14);
                ctx.lineTo(20, 14);
                ctx.closePath();
                ctx.fill();
            } else {
                // F1 style
                ctx.beginPath();
                ctx.moveTo(25, 0);
                ctx.lineTo(15, -8);
                ctx.lineTo(-5, -8);
                ctx.lineTo(-15, -12);
                ctx.lineTo(-25, -10);
                ctx.lineTo(-25, 10);
                ctx.lineTo(-15, 12);
                ctx.lineTo(-5, 8);
                ctx.lineTo(15, 8);
                ctx.closePath();
                ctx.fill();
            }
            
            // Accent
            ctx.fillStyle = accentColor;
            ctx.fillRect(-5, -5, 15, 10);
            
            // Decals
            if (decal === 1) {
                ctx.fillStyle = '#fff';
                ctx.beginPath();
                ctx.arc(0, 0, 5, 0, Math.PI * 2);
                ctx.fill();
            } else if (decal === 2) {
                ctx.strokeStyle = '#fff';
                ctx.lineWidth = 2;
                ctx.beginPath();
                ctx.moveTo(-10, 0);
                ctx.lineTo(10, 0);
                ctx.stroke();
            } else if (decal === 3) {
                ctx.fillStyle = '#ff0000';
                ctx.fillRect(-5, -8, 10, 16);
            } else if (decal === 4) {
                ctx.fillStyle = '#000';
                ctx.font = '12px Arial';
                ctx.fillText('X', -4, 4);
            } else if (decal === 5) {
                ctx.fillStyle = '#ffcc00';
                ctx.beginPath();
                ctx.moveTo(0, -8);
                ctx.lineTo(6, 4);
                ctx.lineTo(-6, 4);
                ctx.closePath();
                ctx.fill();
            }
            
            // Wheels
            ctx.fillStyle = wheelColor;
            ctx.fillRect(-20, -16, 12, 6);
            ctx.fillRect(-20, 10, 12, 6);
            ctx.fillRect(8, -16, 12, 6);
            ctx.fillRect(8, 10, 12, 6);
            
            ctx.restore();
        }

        // Save/Load Functions
        function saveCustomization() {
            localStorage.setItem('carCustomization', JSON.stringify({
                bodyColor: car.bodyColor,
                accentColor: car.accentColor,
                wheelColor: car.wheelColor,
                style: car.style,
                decal: car.decal
            }));
            showNotification('Customization saved!', 'success');
            hideCustomize();
        }

        function loadCustomization() {
            const saved = localStorage.getItem('carCustomization');
            if (saved) {
                const custom = JSON.parse(saved);
                car.bodyColor = custom.bodyColor || '#ff0000';
                car.accentColor = custom.accentColor || '#ffffff';
                car.wheelColor = custom.wheelColor || '#333333';
                car.style = custom.style || 0;
                car.decal = custom.decal || 0;
            }
        }

        function saveSettings() {
            localStorage.setItem('playerName', document.getElementById('playerName').value);
            localStorage.setItem('difficulty', document.getElementById('difficulty').value);
            localStorage.setItem('lapCount', document.getElementById('lapCount').value);
            showNotification('Settings saved!', 'success');
            hideSettings();
        }

        function loadSettings() {
            // Settings are loaded when needed
        }

        function loadLeaderboard() {
            const saved = localStorage.getItem('leaderboard');
            if (saved) {
                leaderboard = JSON.parse(saved);
            }
        }

        function loadCustomTracks() {
            const saved = localStorage.getItem('customTracks');
            if (saved) {
                customTracks = JSON.parse(saved);
            }
        }

        // Notification System
        function showNotification(message, type = 'info') {
            const notification = document.getElementById('notification');
